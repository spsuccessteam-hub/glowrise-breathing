<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>A Moment for You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background-color: #c8dce8;
font-family: Georgia, ‘Times New Roman’, serif;
display: flex;
align-items: flex-start;
justify-content: center;
min-height: 100vh;
overflow: hidden;
}

.wrapper {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
width: 100%;
max-height: 56vh;
padding: 20px 20px 10px;
gap: 0;
}

.heading {
font-size: clamp(0.7rem, 2.5vw, 0.85rem);
letter-spacing: 0.25em;
color: #3a5265;
text-transform: uppercase;
margin-bottom: 6px;
text-align: center;
}

.subtitle {
font-size: clamp(0.7rem, 2vw, 0.8rem);
color: #4a6578;
letter-spacing: 0.08em;
text-align: center;
line-height: 1.6;
margin-bottom: 14px;
}

.orb-container {
position: relative;
width: 160px;
height: 160px;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 14px;
animation: breathe 10s ease-in-out infinite;
}

.ring {
position: absolute;
border-radius: 50%;
border: 1px solid rgba(100, 140, 165, 0.3);
}
.ring-1 { width: 160px; height: 160px; }
.ring-2 { width: 130px; height: 130px; }

.orb {
width: 100px;
height: 100px;
border-radius: 50%;
background: radial-gradient(circle at 38% 32%, #fefbe8, #f5eea0, #e8d96a);
box-shadow:
0 0 25px rgba(232, 217, 106, 0.35),
0 0 50px rgba(232, 217, 106, 0.15);
position: relative;
z-index: 1;
}

@keyframes breathe {
0%   { transform: scale(0.88); }
40%  { transform: scale(1.12); }
50%  { transform: scale(1.12); }
90%  { transform: scale(0.88); }
100% { transform: scale(0.88); }
}

.phase {
font-style: italic;
font-size: clamp(0.9rem, 3vw, 1.05rem);
color: #3a5265;
letter-spacing: 0.05em;
text-align: center;
min-height: 1.4rem;
margin-bottom: 6px;
}

.countdown {
font-size: clamp(1.8rem, 6vw, 2.2rem);
font-weight: 300;
color: #3a5265;
text-align: center;
font-family: Georgia, serif;
min-height: 2.6rem;
}
</style>

</head>
<body>
<div class="wrapper">
  <div class="heading">A Moment for You</div>
  <div class="subtitle">
    Let's settle your nervous system.<br>
    One breath together.
  </div>
  <div class="orb-container">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="orb"></div>
  </div>
  <div class="phase" id="phase">Breathe in...</div>
  <div class="countdown" id="countdown">6</div>
</div>

<script>
  const phases = [
    { label: 'Breathe in...',  duration: 6 },
    { label: 'Hold...',        duration: 4 },
    { label: 'Breathe out...', duration: 6 },
  ];

  let phaseIndex = 0;
  let count = phases[0].duration;

  const phaseEl = document.getElementById('phase');
  const countEl = document.getElementById('countdown');

  function tick() {
    phaseEl.textContent = phases[phaseIndex].label;
    countEl.textContent = count;
    count--;
    if (count < 0) {
      phaseIndex = (phaseIndex + 1) % phases.length;
      count = phases[phaseIndex].duration;
    }
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
