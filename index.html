<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before We Begin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #b8dff0;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-family: ‘Georgia’, serif;
overflow: hidden;
}

.heading {
font-size: 1.1rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: #f0e6c8;
margin-bottom: 10px;
opacity: 0.9;
}

.subheading {
font-size: 0.88rem;
color: #f0e6c8;
margin-bottom: 48px;
letter-spacing: 0.05em;
text-align: center;
padding: 0 24px;
line-height: 1.7;
opacity: 0.85;
}

.circle-container {
position: relative;
width: 240px;
height: 240px;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 36px;
}

.ring {
position: absolute;
border-radius: 50%;
border: 1px solid rgba(240, 230, 200, 0.3);
}
.ring-1 { width: 240px; height: 240px; }
.ring-2 { width: 195px; height: 195px; }
.ring-3 { width: 150px; height: 150px; }

.glow {
position: absolute;
width: 180px;
height: 180px;
border-radius: 50%;
background: radial-gradient(circle, rgba(200,145,58,0.2), transparent 70%);
z-index: 1;
}

.circle {
width: 115px;
height: 115px;
border-radius: 50%;
background: radial-gradient(circle at 35% 30%, #c8913a, #7a4e1e, #3d2108);
box-shadow:
0 0 50px rgba(200, 145, 58, 0.5),
0 0 100px rgba(200, 145, 58, 0.2),
inset 0 0 30px rgba(255, 220, 150, 0.08);
display: flex;
align-items: center;
justify-content: center;
position: relative;
z-index: 2;
}

.circle-inner {
width: 55px;
height: 55px;
border-radius: 50%;
background: radial-gradient(circle at 40% 40%, rgba(255, 220, 150, 0.2), transparent);
}

.breath-label {
font-size: 1.05rem;
letter-spacing: 0.08em;
color: #f0e6c8;
margin-bottom: 8px;
min-height: 30px;
text-align: center;
font-style: italic;
opacity: 1;
transition: opacity 0.6s ease;
}

.countdown {
font-size: 2rem;
color: #f0e6c8;
letter-spacing: 0.05em;
text-align: center;
min-height: 48px;
font-weight: 300;
opacity: 0.85;
}

canvas {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 0;
}

.content {
position: relative;
z-index: 1;
display: flex;
flex-direction: column;
align-items: center;
}
</style>

</head>
<body>

<canvas id="particles"></canvas>

<div class="content">
  <p class="heading">Before we begin</p>
  <p class="subheading">Let's settle your nervous system.<br>One breath together.</p>

  <div class="circle-container">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="glow" id="glow"></div>
    <div class="circle" id="circle">
      <div class="circle-inner"></div>
    </div>
  </div>

  <p class="breath-label" id="breathLabel">Breathe in...</p>
  <p class="countdown" id="countdown">6</p>
</div>

<script>
  var phases = [
    { label: 'Breathe in...', seconds: 6, scaleFrom: 1.0, scaleTo: 1.6 },
    { label: 'Hold gently...', seconds: 4, scaleFrom: 1.6, scaleTo: 1.6 },
    { label: 'Breathe out...', seconds: 6, scaleFrom: 1.6, scaleTo: 1.0 }
  ];

  var circle = document.getElementById('circle');
  var breathLabel = document.getElementById('breathLabel');
  var countdown = document.getElementById('countdown');

  var currentPhase = 0;
  var phaseDuration = phases[0].seconds * 1000;
  var phaseElapsed = 0;
  var lastTime = null;

  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function setPhase(index) {
    currentPhase = index;
    var phase = phases[index];
    phaseElapsed = 0;
    phaseDuration = phase.seconds * 1000;
    breathLabel.style.opacity = '0';
    setTimeout(function() {
      breathLabel.textContent = phase.label;
      breathLabel.style.opacity = '1';
    }, 800);
    countdown.textContent = phase.seconds;
  }

  function animate(timestamp) {
    if (!lastTime) lastTime = timestamp;
    var delta = timestamp - lastTime;
    lastTime = timestamp;
    phaseElapsed += delta;

    var phase = phases[currentPhase];
    var progress = Math.min(phaseElapsed / phaseDuration, 1);
    var eased = easeInOut(progress);
    var scale = lerp(phase.scaleFrom, phase.scaleTo, eased);
    circle.style.transform = 'scale(' + scale + ')';

    var secsLeft = Math.ceil((phaseDuration - phaseElapsed) / 1000);
    if (secsLeft < 1) secsLeft = 1;
    if (secsLeft !== parseInt(countdown.textContent)) {
      countdown.textContent = secsLeft;
    }

    if (phaseElapsed >= phaseDuration) {
      setPhase((currentPhase + 1) % phases.length);
    }

    requestAnimationFrame(animate);
  }

  breathLabel.textContent = phases[0].label;
  countdown.textContent = phases[0].seconds;
  requestAnimationFrame(animate);

  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var particles = [];
  for (var i = 0; i < 35; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.8 + 0.4,
      speed: Math.random() * 0.3 + 0.08,
      opacity: Math.random() * 0.25 + 0.08,
      drift: (Math.random() - 0.5) * 0.3
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(240, 230, 200, ' + p.opacity + ')';
      ctx.fill();
      p.y -= p.speed;
      p.x += p.drift;
      if (p.y < -5) {
        p.y = canvas.height + 5;
        p.x = Math.random() * canvas.width;
      }
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
</script>

</body>
</html>
