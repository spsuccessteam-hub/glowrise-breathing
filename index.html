<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before We Begin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: linear-gradient(160deg, #1a1208 0%, #2c1f0e 40%, #1a1208 100%);
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-family: ‘Georgia’, serif;
color: #f0e6c8;
overflow: hidden;
}

.heading {
font-size: 1.1rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: #d4a842;
margin-bottom: 10px;
opacity: 0.9;
}

.subheading {
font-size: 0.88rem;
color: #b89a6a;
margin-bottom: 48px;
letter-spacing: 0.05em;
text-align: center;
padding: 0 24px;
line-height: 1.7;
}

.circle-container {
position: relative;
width: 240px;
height: 240px;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 36px;
}

.ring {
position: absolute;
border-radius: 50%;
border: 1px solid rgba(212, 168, 66, 0.15);
}
.ring-1 { width: 240px; height: 240px; }
.ring-2 { width: 195px; height: 195px; border-color: rgba(212, 168, 66, 0.1); }
.ring-3 { width: 150px; height: 150px; border-color: rgba(212, 168, 66, 0.08); }

.glow {
position: absolute;
width: 180px;
height: 180px;
border-radius: 50%;
background: radial-gradient(circle, rgba(200,145,58,0.12), transparent 70%);
z-index: 1;
}

.circle {
width: 115px;
height: 115px;
border-radius: 50%;
background: radial-gradient(circle at 35% 30%, #c8913a, #7a4e1e, #3d2108);
box-shadow:
0 0 50px rgba(200, 145, 58, 0.45),
0 0 100px rgba(200, 145, 58, 0.15),
inset 0 0 30px rgba(255, 220, 150, 0.08);
display: flex;
align-items: center;
justify-content: center;
position: relative;
z-index: 2;
transition: transform 0.1s linear, box-shadow 0.1s linear;
}

.circle-inner {
width: 55px;
height: 55px;
border-radius: 50%;
background: radial-gradient(circle at 40% 40%, rgba(255, 220, 150, 0.2), transparent);
}

.breath-label {
font-size: 1.05rem;
letter-spacing: 0.08em;
color: #e8d5a8;
margin-bottom: 8px;
min-height: 30px;
text-align: center;
font-style: italic;
opacity: 1;
transition: opacity 0.6s ease;
}

.countdown {
font-size: 2rem;
color: #d4a842;
letter-spacing: 0.05em;
text-align: center;
min-height: 48px;
font-weight: 300;
opacity: 0.9;
}

canvas {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 0;
}

.content {
position: relative;
z-index: 1;
display: flex;
flex-direction: column;
align-items: center;
}

body::before {
content: ‘’;
position: fixed;
top: 0; left: 0; right: 0;
height: 80px;
background: linear-gradient(to bottom, rgba(26,18,8,0.8), transparent);
z-index: 2;
pointer-events: none;
}
</style>

</head>
<body>

<canvas id="particles"></canvas>

<div class="content">
  <p class="heading">Before we begin</p>
  <p class="subheading">Let's settle your nervous system.<br>One breath together.</p>

  <div class="circle-container">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="glow" id="glow"></div>
    <div class="circle" id="circle">
      <div class="circle-inner"></div>
    </div>
  </div>

  <p class="breath-label" id="breathLabel">Breathe in...</p>
  <p class="countdown" id="countdown">6</p>
</div>

<script>
  // Phases: label, duration in seconds, orb scale target
  var phases = [
    { label: 'Breathe in...', seconds: 6, scaleFrom: 1.0, scaleTo: 1.6 },
    { label: 'Hold gently...', seconds: 4, scaleFrom: 1.6, scaleTo: 1.6 },
    { label: 'Breathe out...', seconds: 6, scaleFrom: 1.6, scaleTo: 1.0 }
  ];

  var circle = document.getElementById('circle');
  var glow = document.getElementById('glow');
  var breathLabel = document.getElementById('breathLabel');
  var countdown = document.getElementById('countdown');

  var currentPhase = 0;
  var currentScale = 1.0;
  var targetScale = 1.6;
  var phaseSecondsLeft = phases[0].seconds;
  var phaseProgress = 0; // 0 to 1
  var lastTime = null;
  var phaseDuration = phases[0].seconds * 1000;
  var phaseElapsed = 0;
  var transitioning = false;

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function setPhase(index) {
    currentPhase = index;
    var phase = phases[index];
    phaseElapsed = 0;
    phaseDuration = phase.seconds * 1000;
    phaseSecondsLeft = phase.seconds;

    // Fade label out then in
    breathLabel.style.opacity = '0';
    setTimeout(function() {
      breathLabel.textContent = phase.label;
      breathLabel.style.opacity = '1';
    }, 800);

    countdown.textContent = phase.seconds;
  }

  function animate(timestamp) {
    if (!lastTime) lastTime = timestamp;
    var delta = timestamp - lastTime;
    lastTime = timestamp;

    phaseElapsed += delta;

    var phase = phases[currentPhase];
    var progress = Math.min(phaseElapsed / phaseDuration, 1);
    var eased = easeInOut(progress);

    // Scale orb
    var scale = lerp(phase.scaleFrom, phase.scaleTo, eased);
    circle.style.transform = 'scale(' + scale + ')';

    // Glow follows
    var glowScale = lerp(1, 1.8, eased * (phase.scaleTo > phase.scaleFrom ? eased : 1 - eased + (phase.scaleFrom === phase.scaleTo ? 0.5 : 0)));
    if (phase.scaleFrom === phase.scaleTo) glowScale = 1.8; // hold phase
    glow.style.transform = 'scale(' + glowScale + ')';

    // Countdown
    var secsLeft = Math.ceil((phaseDuration - phaseElapsed) / 1000);
    if (secsLeft < 1) secsLeft = 1;
    if (secsLeft !== parseInt(countdown.textContent)) {
      countdown.textContent = secsLeft;
    }

    // Next phase
    if (phaseElapsed >= phaseDuration) {
      setPhase((currentPhase + 1) % phases.length);
    }

    requestAnimationFrame(animate);
  }

  // Initialise first phase display
  breathLabel.textContent = phases[0].label;
  countdown.textContent = phases[0].seconds;
  requestAnimationFrame(animate);

  // Particles
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var particles = [];
  for (var i = 0; i < 35; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.8 + 0.4,
      speed: Math.random() * 0.35 + 0.08,
      opacity: Math.random() * 0.35 + 0.08,
      drift: (Math.random() - 0.5) * 0.3
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(212, 168, 66, ' + p.opacity + ')';
      ctx.fill();
      p.y -= p.speed;
      p.x += p.drift;
      if (p.y < -5) {
        p.y = canvas.height + 5;
        p.x = Math.random() * canvas.width;
      }
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
</script>

</body>
</html>
